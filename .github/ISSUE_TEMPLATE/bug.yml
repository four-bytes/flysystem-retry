name: Bug report
description: Report something that is broken or incorrect
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.3.1
    validations:
      required: false
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: e.g. 0.1.0
    validations:
      required: false
